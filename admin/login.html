<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Hepi Cure</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="interstitial" style="background:var(--grad-hero);">
  <div class="inter-card reveal in" style="text-align:left;">
    <div style="text-align:center;">
      <div class="icon-blob" style="background:var(--ink);">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Admin Login</h1>
      <p>Sign in to manage meals, users, orders and settings.</p>
    </div>
    <form id="adminLoginForm">
      <div class="field" style="text-align:left;">
        <label>Admin Email</label>
        <div class="input-wrap">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 6 10-6"/></svg>
          <input type="email" id="aEmail" value="admin@hepicure.com" required>
        </div>
      </div>
      <div class="field" style="text-align:left;">
        <label>Password</label>
        <div class="input-wrap">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input type="password" id="aPass" placeholder="" required>
        </div>
      </div>
      <p class="form-error" id="aErr">Incorrect credentials. Try admin@hepicure.com / admin123 (demo)</p>
      <button class="btn btn-primary btn-block" type="submit">Login to Dashboard</button>
    </form>
    <p style="text-align:center; margin-top:20px; font-size:12.5px; color:var(--text-muted);"></p>
    <a href="../index.html" class="back" style="justify-content:center; margin-top:14px;">← Back to site</a>
  </div>
</div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
  document.getElementById("adminLoginForm").addEventListener("submit",(e)=>{
    e.preventDefault();
    const email = document.getElementById("aEmail").value.trim();
    const pass = document.getElementById("aPass").value;
    const err = document.getElementById("aErr");
    if(email === "admin@hepicure.com" && pass === "admin123"){
      localStorage.setItem("hc_admin","true");
      window.location.href = "dashboard.html";
    } else {
      err.classList.add("show");
    }
  });
</script>
</body>
</html>
