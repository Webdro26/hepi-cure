<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Reset Password — Hepi Cure</title><link rel="stylesheet" href="css/style.css"></head>
<body><div class="auth-wrap"><div class="auth-visual"><div class="auth-visual-inner"><img src="images/logo.png" alt="Hepi Cure" class="auth-logo-img"><h2>Reset your password</h2><p>Use your registered email and create a new password securely for this website account.</p></div></div><div class="auth-form-side"><div class="auth-box"><a href="login.html" class="back">← Back to login</a><h1>Forgot Password</h1><p>Enter your registered email and choose a new password.</p><form id="resetForm"><div class="field"><label>Email</label><div class="input-wrap"><input id="resetEmail" type="email" required placeholder="you@example.com"></div></div><div class="field"><label>New Password</label><div class="input-wrap"><input id="resetPassword" type="password" minlength="6" required placeholder="Minimum 6 characters"></div></div><div class="field"><label>Confirm New Password</label><div class="input-wrap"><input id="resetConfirm" type="password" minlength="6" required placeholder="Re-enter new password"></div></div><p class="form-error" id="resetError"></p><button class="btn btn-primary btn-block" type="submit">Update Password</button></form></div></div></div><script src="js/data.js"></script><script src="js/app.js"></script><script>document.getElementById('resetForm').addEventListener('submit',e=>{e.preventDefault();const err=document.getElementById('resetError');err.classList.remove('show');const email=document.getElementById('resetEmail').value.trim();const pass=document.getElementById('resetPassword').value;const confirm=document.getElementById('resetConfirm').value;if(pass!==confirm){err.textContent='Passwords do not match.';err.classList.add('show');return;}try{Auth.resetPassword({email,newPassword:pass});toast('Password updated successfully');setTimeout(()=>location.href='login.html',700);}catch(ex){err.textContent=ex.message;err.classList.add('show');}});</script></body></html>
