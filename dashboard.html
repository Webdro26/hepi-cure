<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home — Hepi Cure</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div class="container app-topbar">
    <div class="app-greet">
      <div>
        <h1 id="greetName">Hello, User 👋</h1>
        <p>Today's Healthy Menu</p>
      </div>
      <a href="profile.html" class="profile-link-text" aria-label="Open profile">Profile</a>
    </div>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search meals, e.g. paneer, oats, juice...">
    </div>

    <div class="cat-scroll" id="catScroll"></div>
  </div>

  <div class="container">
    <div class="meal-grid" id="mealGrid" style="margin-top:20px;"></div>
    <p id="emptyState" style="display:none; text-align:center; color:var(--text-muted); padding:60px 0;">No meals match your search. Try a different keyword.</p>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="bn-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a href="subscription-status.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
    Subscription
  </a>
  <a href="track-order.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Track Order
  </a>
  <a href="profile.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
    Profile
  </a>
</div>

<a class="fab-wa" style="bottom:96px;" href="https://wa.me/917300748429" target="_blank" rel="noopener" aria-label="Chat on WhatsApp">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.005c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2z"/></svg>
</a>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.requireLogin();
  const user = Auth.currentUser();
  if(user){
    document.getElementById("greetName").textContent = `Hello, ${user.name.split(" ")[0]} 👋`;
  }

  let activeCat = "all";
  let query = "";

  function catIconHTML(icon){
    return icon.includes("/") ? `<img src="${icon}" alt="">` : icon;
  }

  function renderCats(){
    const el = document.getElementById("catScroll");
    el.innerHTML = `<button class="cat-chip ${activeCat==='all'?'active':''}" data-cat="all"><span class="ic"><img src="images/chefs-thali.png" alt=""></span>All</button>` +
      CATEGORIES.map(c=>`<button class="cat-chip ${activeCat===c.id?'active':''}" data-cat="${c.id}"><span class="ic">${catIconHTML(c.icon)}</span>${c.label}</button>`).join("");
    el.querySelectorAll(".cat-chip").forEach(b=>b.addEventListener("click", ()=>{ activeCat=b.dataset.cat; renderCats(); renderMeals(); }));
  }

  function renderMeals(){
    let list = activeCat==="all" ? MEALS : MEALS.filter(m=>m.cat===activeCat);
    if(query.trim()){
      const q = query.toLowerCase();
      list = list.filter(m => m.name.toLowerCase().includes(q) || m.ingredients.toLowerCase().includes(q));
    }
    const grid = document.getElementById("mealGrid");
    const empty = document.getElementById("emptyState");
    grid.innerHTML = list.map(mealCardHTML).join("");
    empty.style.display = list.length ? "none" : "block";
    initReveal();
  }

  document.getElementById("searchInput").addEventListener("input", (e)=>{ query = e.target.value; renderMeals(); });

  renderCats();
  renderMeals();
</script>
</body>
</html>
