<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Health Assessment — Hepi Cure</title><link rel="stylesheet" href="css/style.css"></head>
<body><div class="assessment-page"><div class="container assessment-container"><div class="assessment-card reveal in"><div class="assessment-head"><span class="eyebrow">Health Assessment</span><h1 id="welcomeMsg">Tell us about your goals</h1><p>Your assessment is marked complete only after this form is submitted.</p></div><form id="assessmentForm" class="assessment-grid"><div class="field"><label>Primary Goal</label><div class="input-wrap"><select id="goal" required><option value="">Select goal</option><option>Weight Management</option><option>Healthy Eating</option><option>Muscle Gain</option><option>Diabetes-Friendly Meals</option><option>General Wellness</option></select></div></div><div class="field"><label>Food Preference</label><div class="input-wrap"><select id="preference" required><option value="">Select preference</option><option>Vegetarian</option><option>Non-Vegetarian</option><option>Eggetarian</option><option>Vegan</option></select></div></div><div class="field"><label>Age</label><div class="input-wrap"><input id="age" type="number" min="10" max="100" required></div></div><div class="field"><label>Activity Level</label><div class="input-wrap"><select id="activity" required><option value="">Select level</option><option>Low</option><option>Moderate</option><option>High</option></select></div></div><div class="field assessment-full"><label>Allergies or foods to avoid</label><div class="input-wrap"><textarea id="allergies" rows="3" placeholder="Write none if there are no restrictions" required></textarea></div></div><div class="field assessment-full"><label>Additional notes</label><div class="input-wrap"><textarea id="notes" rows="3" placeholder="Anything else our team should know"></textarea></div></div><div class="assessment-actions assessment-full"><button class="btn btn-primary" type="submit">Submit Assessment</button><a class="btn btn-outline" href="dashboard.html">Complete Later</a></div></form></div></div></div><script src="js/data.js"></script><script src="js/app.js"></script><script>Auth.requireLogin();let user=Auth.currentUser();if(user){document.getElementById('welcomeMsg').textContent=`Tell us about your goals, ${user.name.split(' ')[0]}`;const saved=user.assessment||{};['goal','preference','age','activity','allergies','notes'].forEach(k=>{if(saved[k]!==undefined)document.getElementById(k).value=saved[k];});}document.getElementById('assessmentForm').addEventListener('submit',e=>{e.preventDefault();const assessment={goal:goal.value,preference:preference.value,age:age.value,activity:activity.value,allergies:allergies.value.trim(),notes:notes.value.trim(),submittedAt:Date.now()};Auth.updateCurrent({assessmentDone:true,assessment,assessmentCompletedAt:Date.now()});toast('Assessment completed successfully');setTimeout(()=>location.href='subscription.html',700);});</script></body></html>
