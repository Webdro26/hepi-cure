<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Subscription — Hepi Cure</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div class="container app-topbar">
    <div class="app-greet">
      <div><h1>Subscription</h1><p>Manage your active plan</p></div>
    </div>
  </div>

  <div class="container" style="max-width:640px;">
    <div class="card reveal in" id="planCard"></div>

    <div class="card reveal in" style="margin-top:20px;">
      <h3 style="font-size:16px; margin-bottom:16px;">Explore other plans</h3>
      <div style="display:flex; flex-direction:column; gap:12px;" id="otherPlans"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a href="subscription-status.html" class="bn-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
    Subscription
  </a>
  <a href="track-order.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Track Order
  </a>
  <a href="profile.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
    Profile
  </a>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.requireLogin();
  const user = Auth.currentUser();
  const plan = PLANS.find(p => p.id === user.plan);

  function daysLeft(){
    if(!user.planStart) return 30;
    const elapsed = Math.floor((Date.now() - user.planStart) / 86400000);
    return Math.max(0, 30 - elapsed);
  }

  const card = document.getElementById("planCard");
  if(plan){
    const remaining = daysLeft();
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <span class="pill green">Active</span>
          <h3 style="margin-top:10px; font-size:19px;">${plan.name} Plan</h3>
          <p style="color:var(--text-muted); font-size:13px;">₹${plan.price} ${plan.period}</p>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><strong>${remaining}</strong><span>Days Left</span></div>
        <div class="stat-box"><strong>${remaining*2}</strong><span>Meals Remaining</span></div>
        <div class="stat-box"><strong>${new Date(Date.now()+remaining*86400000).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</strong><span>Renews On</span></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px;">
        <a href="${waLink('Hi Hepi Cure,\\nI would like to renew my '+plan.name+' Plan.\\n\\nMy Name: \\nPhone Number: \\n\\nThank you.')}" target="_blank" rel="noopener" class="btn btn-primary btn-block">Renew</a>
        <button class="btn btn-outline btn-block" onclick="pauseSub()">Pause</button>
      </div>`;
  } else {
    card.innerHTML = `
      <div style="text-align:center; padding:20px 0;">
        <h3 style="margin-bottom:8px;">No active subscription</h3>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Choose a plan to start receiving healthy meals every day.</p>
        <a href="subscription.html" class="btn btn-primary">Browse Plans</a>
      </div>`;
  }

  document.getElementById("otherPlans").innerHTML = PLANS.filter(p=>p.id!==user.plan).map(p=>`
    <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border:1px solid var(--border); border-radius:14px;">
      <div>
        <strong style="font-family:var(--font-head); font-size:14px;">${p.name}</strong>
        <div style="font-size:12.5px; color:var(--text-muted);">₹${p.price} ${p.period}</div>
      </div>
      <a href="${subscribeLink(p.name)}" target="_blank" rel="noopener" class="btn btn-sm btn-outline" onclick="Auth.updateCurrent({plan:'${p.id}', planName:'${p.name}', planStart: Date.now()})">Switch</a>
    </div>`).join("");

  function pauseSub(){
    toast("Subscription paused — resume any time from this page");
  }
</script>
</body>
</html>
