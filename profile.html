<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Hepi Cure</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div class="container app-topbar">
    <div class="app-greet"><div><h1>Profile</h1><p>Your account details</p></div></div>
  </div>

  <div class="container" style="max-width:560px;">
    <div class="card reveal in" style="text-align:center; margin-bottom:20px;">
      <h3 id="pName" style="font-size:19px;">User</h3>
      <p id="pEmail" style="color:var(--text-muted); font-size:13.5px;">user@example.com</p>
      <span class="pill green" id="assessStatus" style="margin-top:10px; display:inline-block;">Assessment Pending</span>
    </div>

    <div class="card reveal in" id="editCard">
      <h3 style="font-size:15px; margin-bottom:18px;">Edit Profile</h3>
      <div class="field"><label>Full Name</label><div class="input-wrap"><input type="text" id="editName"></div></div>
      <div class="field"><label>Phone Number</label><div class="input-wrap"><input type="tel" id="editPhone"></div></div>
      <button class="btn btn-primary btn-block" onclick="saveProfile()">Save Changes</button>
    </div>

    <div class="card reveal in" style="margin-top:20px; display:flex; flex-direction:column; gap:2px; padding:8px;">
      <a href="assessment.html" style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-radius:14px;" class="profile-row">
        <span style="display:flex; align-items:center; gap:12px; font-size:14px; font-weight:600;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--olive)" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Health Assessment
        </span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a href="subscription-status.html" style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-radius:14px;" class="profile-row">
        <span style="display:flex; align-items:center; gap:12px; font-size:14px; font-weight:600;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--olive)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
          My Subscription
        </span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <button onclick="doLogout()" style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-radius:14px; width:100%; text-align:left;" class="profile-row">
        <span style="display:flex; align-items:center; gap:12px; font-size:14px; font-weight:600; color:#B4472F;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#B4472F" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          Logout
        </span>
      </button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a href="subscription-status.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
    Subscription
  </a>
  <a href="track-order.html" class="bn-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Track Order
  </a>
  <a href="profile.html" class="bn-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
    Profile
  </a>
</div>

<style>.profile-row:hover{ background:var(--cream-deep); }</style>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.requireLogin();
  const user = Auth.currentUser();
  document.getElementById("pName").textContent = user.name;
  document.getElementById("pEmail").textContent = user.email;
  document.getElementById("editName").value = user.name;
  document.getElementById("editPhone").value = user.phone;
  const badge = document.getElementById("assessStatus");
  if(user.assessmentDone){ badge.textContent = "Assessment Complete"; badge.className="pill green"; }
  else { badge.textContent = "Assessment Pending"; badge.className="pill orange"; }

  function saveProfile(){
    Auth.updateCurrent({ name: document.getElementById("editName").value, phone: document.getElementById("editPhone").value });
    document.getElementById("pName").textContent = document.getElementById("editName").value;
    toast("Profile updated");
  }
  function doLogout(){
    Auth.logout();
    window.location.href = "index.html";
  }
</script>
</body>
</html>
