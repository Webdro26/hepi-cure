<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Track Order — Hepi Cure</title><link rel="stylesheet" href="css/style.css"></head>
<body><div class="app-shell"><div class="container app-topbar"><div class="app-greet"><div><h1>Track Order</h1><p>Status updated by the Hepi Cure admin team</p></div></div></div><div class="container track-container" id="trackContainer"></div></div><div class="bottom-nav"><a href="dashboard.html" class="bn-item">⌂<span>Home</span></a><a href="subscription-status.html" class="bn-item">▣<span>Subscription</span></a><a href="track-order.html" class="bn-item active">◷<span>Track Order</span></a><a href="profile.html" class="bn-item">◯<span>Profile</span></a></div><script src="js/data.js"></script><script src="js/app.js"></script><script>Auth.requireLogin();const statusFlow=['Order Placed','Preparing','Out for Delivery','Delivered'];const user=Auth.currentUser();const orders=getOrders().filter(o=>(o.email&&o.email.toLowerCase()===user.email.toLowerCase())||(!o.email&&o.phone&&o.phone===user.phone)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));const box=document.getElementById('trackContainer');function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}function fmt(t){return t?new Date(t).toLocaleString([], {dateStyle:'medium',timeStyle:'short'}):'Pending';}if(!orders.length){box.innerHTML='<div class="card empty-order-card"><div class="empty-order-icon">🛍️</div><h2>No orders yet</h2><p>Place a meal order and its status will appear here.</p><a href="dashboard.html" class="btn btn-primary">Browse Meals</a></div>';}else{box.innerHTML=orders.map((o,index)=>{const current=statusFlow.indexOf(o.status);const cancelled=o.status==='Cancelled';const steps=statusFlow.map((st,i)=>{const done=!cancelled&&i<current;const active=!cancelled&&i===current;return `<div class="tl-step ${done?'done':''} ${active?'current':''}"><div class="tl-dot">${done?'✓':active?'●':'○'}</div><div class="tl-content"><h4>${st}</h4><p>${fmt(o.statusTimes?.[st])}</p></div></div>`}).join('');return `<div class="card order-track-card ${index?'secondary-order':''}"><div class="order-track-head"><div><span class="pill ${o.status==='Delivered'?'green':cancelled?'red':o.status==='Order Placed'?'gray':'orange'}">${esc(o.status)}</span><h3>Order #${esc(o.id)}</h3><p>${esc(o.meal)} · ₹${esc(o.price||'')}</p></div><small>${fmt(o.createdAt)}</small></div>${cancelled?'<div class="cancelled-note">This order was cancelled.</div>':`<div class="timeline">${steps}</div>`}<a class="btn btn-olive btn-block" target="_blank" rel="noopener" href="${waLink(`Hi Hepi Cure, I need help with order #${o.id}`)}">Chat on WhatsApp for Support</a></div>`}).join('');}</script></body></html>
