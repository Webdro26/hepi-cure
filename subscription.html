<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose a Plan — Hepi Cure</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><img src="images/logo.png" alt="Hepi Cure" class="logo-img"></a>
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <span id="skipLink"></span>
    </div>
  </div>
</nav>

<section class="section" style="padding-top:48px;">
  <div class="container">
    <div class="section-head center reveal">
      <span class="eyebrow">Choose Your Plan</span>
      <h2>Pick the plan that fits your goals</h2>
      <p>Subscribing is instant — tap a plan and confirm your details on WhatsApp. No card required.</p>
    </div>
    <div class="pricing-grid" id="pricing-grid"></div>
  </div>
</section>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  Auth.requireLogin();

  document.getElementById("pricing-grid").innerHTML = PLANS.map(p=>`
    <div class="price-card reveal in ${p.featured?'featured':''}">
      ${p.featured?'<span class="ribbon">Most Popular</span>':''}
      <h3>${p.name} Plan</h3>
      <p style="font-size:13px;${p.featured?'color:rgba(255,255,255,.8)':'color:var(--text-muted)'}">${p.tagline}</p>
      <div class="plan-price">₹${p.price}<span> ${p.period}</span></div>
      <ul class="price-list">
        ${p.features.map(f=>`<li><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>${f}</li>`).join("")}
      </ul>
      <a href="${subscribeLink(p.name)}" target="_blank" rel="noopener" class="btn ${p.featured?'btn-ghost-light':'btn-primary'} btn-block" onclick="choosePlan('${p.id}','${p.name}')">Subscribe on WhatsApp</a>
    </div>`).join("");

  function choosePlan(id, name){
    Auth.updateCurrent({ plan:id, planName:name, planStart: Date.now() });
    toast(`${name} plan selected — confirm on WhatsApp`);
    setTimeout(()=>{ window.location.href = "dashboard.html"; }, 1200);
  }

  document.getElementById("skipLink").innerHTML = `<a href="dashboard.html" class="btn btn-outline btn-sm">Skip to Dashboard</a>`;
  document.addEventListener("DOMContentLoaded", initReveal);
</script>
</body>
</html>
